{% extends "base.html" %}

{% block title %}提交结果{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <a href="{{ url_for('tournament.match_detail', match_id=match.id) }}" class="btn btn-light rounded-pill mb-3">
            <i class="fas fa-arrow-left"></i> 返回比赛详情
        </a>
        <h2>
            <i class="fas fa-check-circle"></i> 提交比赛结果
        </h2>
    </div>
</div>

<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-file-alt"></i> 选择结果</h5>
            </div>
            <div class="card-body">
                <p class="text-muted">请如实选择您的比赛结果</p>
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label"><i class="fas fa-fire"></i> 您的难度选择</label>
                        <select class="form-select" name="difficulty" required>
                            {% set rl = get_roguelike_by_key(match.roguelike) %}
                            {% if rl %}
                                {% for d in range(rl.difficulty_min, rl.difficulty_max + 1) %}
                                    {% set mult = rl.get_multiplier(d) %}
                                    <option value="{{ d }}" {{ 'selected' if match.difficulty == d else '' }}>
                                        {{ d }} 难 (×{{ "%.2f"|format(mult) }})
                                    </option>
                                {% endfor %}
                            {% else %}
                                {% for d in range(12, 19) %}
                                    <option value="{{ d }}" {{ 'selected' if match.difficulty == d else '' }}>{{ d }} 难</option>
                                {% endfor %}
                            {% endif %}
                        </select>
                        <small class="text-muted">您的独立难度，双方难度可以不同。倍率 = 1 + (难度 - 最低难度) × 难度阶级</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="scoreInput"><i class="fas fa-star"></i> 比赛分数</label>
                        <input type="number" class="form-control" id="scoreInput" name="score"
                               placeholder="请输入您的比赛分数" min="0" required
                               value="{{ form.score.data if form.score.data else '' }}">
                        <small class="text-muted">请输入您本场比赛获得的分数</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">比赛结果</label>
                        <div class="d-grid gap-2">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="result" id="resultWin" value="win" required>
                                <label class="form-check-label" for="resultWin">
                                    <i class="fas fa-trophy text-success"></i> 我赢了
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="result" id="resultLose" value="lose">
                                <label class="form-check-label" for="resultLose">
                                    <i class="fas fa-handshake text-danger"></i> 我输了
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="result" id="resultDraw" value="draw">
                                <label class="form-check-label" for="resultDraw">
                                    <i class="fas fa-equals text-info"></i> 平局
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-check"></i> 提交结果
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
